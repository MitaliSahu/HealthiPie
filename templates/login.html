{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 transition-colors">
    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-700">
        <h2 class="text-3xl font-bold text-center text-emerald-800 dark:text-emerald-400 mb-6">Login</h2>
        {% if error %}<p class="text-red-500 text-center mb-4">{{ error }}</p>{% endif %}
        
        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:border-emerald-500">
            <input type="password" name="password" placeholder="Password" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:border-emerald-500">
            <button class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">Login</button>
        </form>
        <p class="text-center mt-4 text-gray-600 dark:text-gray-400">New here? <a href="/register" class="text-emerald-600 font-bold hover:underline">Register</a></p>
    </div>
</div>
{% endblock %}
