{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4">
    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-700">
        <h2 class="text-3xl font-bold text-center text-emerald-600 mb-2">Create Account</h2>
        <p class="text-center text-gray-400 mb-6">Start your health journey</p>
        {% if error %}<p class="text-red-500 text-center mb-4">{{ error }}</p>{% endif %}

        <form method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Choose a Username" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:text-white dark:border-gray-600">
            <input type="password" name="password" placeholder="Choose a Password" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:text-white dark:border-gray-600">
            <hr class="border-gray-100 dark:border-gray-700">
            <input type="text" name="name" placeholder="Full Name" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:text-white dark:border-gray-600">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="number" name="age" placeholder="Age" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:text-white dark:border-gray-600">
                <input type="number" name="height" placeholder="Height (cm)" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:text-white dark:border-gray-600">
            </div>
            
            <input type="number" name="weight" placeholder="Weight (kg)" required class="w-full border p-3 rounded-lg dark:bg-gray-700 dark:text-white dark:border-gray-600">
            
            <select name="goal" class="w-full border p-3 rounded-lg bg-white dark:bg-gray-700 dark:text-white dark:border-gray-600">
                <option>Lose Weight</option>
                <option>Maintain Weight</option>
                <option>Gain Muscle</option>
            </select>
            <button class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">Register</button>
        </form>
        <p class="text-center mt-4 text-gray-600 dark:text-gray-400">Already have an account? <a href="/login" class="text-emerald-600 font-bold">Login</a></p>
    </div>
</div>
{% endblock %}
