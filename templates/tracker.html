{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4">
    <div class="max-w-md w-full bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl border-t-4 border-emerald-500">
        <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">Log Activity</h2>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <label class="flex flex-col items-center justify-center p-4 bg-blue-50 dark:bg-blue-900/30 rounded-xl border border-blue-200 dark:border-blue-700 hover:bg-blue-100 dark:hover:bg-blue-800 transition shadow-sm cursor-pointer group">
                <span class="text-3xl mb-2 group-hover:scale-110 transition">🥗</span>
                <span class="text-xs font-bold text-blue-700 dark:text-blue-300 uppercase">Food Snap</span>
                <input type="file" class="hidden" capture="environment" onchange="snapFoodFill(this)">
            </label>

            <label class="flex flex-col items-center justify-center p-4 bg-purple-50 dark:bg-purple-900/30 rounded-xl border border-purple-200 dark:border-purple-700 hover:bg-purple-100 dark:hover:bg-purple-800 transition shadow-sm cursor-pointer group">
                <span class="text-3xl mb-2 group-hover:scale-110 transition">📦</span>
                <span class="text-xs font-bold text-purple-700 dark:text-purple-300 uppercase">Packet Snap</span>
                <input type="file" class="hidden" capture="environment" onchange="snapPacketFill(this)">
            </label>
        </div>
        <div id="aiStatusMessage" class="hidden mt-4 mb-2 p-3 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-lg text-sm text-center transition-all"></div>
        <form action="/add" method="POST">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <label class="cursor-pointer">
                    <input type="radio" name="type" value="meal" checked onchange="setMode('meal')" class="peer sr-only">
                    <div class="p-3 text-center border rounded-lg peer-checked:bg-emerald-50 peer-checked:border-emerald-500 font-bold text-gray-500 peer-checked:text-emerald-700 dark:peer-checked:bg-emerald-900 dark:peer-checked:text-emerald-300">🍎 Meal</div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="type" value="workout" onchange="setMode('workout')" class="peer sr-only">
                    <div class="p-3 text-center border rounded-lg peer-checked:bg-orange-50 peer-checked:border-orange-500 font-bold text-gray-500 peer-checked:text-orange-700 dark:peer-checked:bg-orange-900 dark:peer-checked:text-orange-300">🏃‍♂️ Workout</div>
                </label>
            </div>

            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <label id="selectLabel" class="text-xs font-bold uppercase text-emerald-600">Choose from List</label>
                    <button type="button" onclick="toggleInputMode()" class="text-xs text-blue-500 hover:text-blue-700 underline">Switch to AI / Manual</button>
                </div>

                <div id="dropdownSection">
                    <select id="foodSelect" onchange="fillItem('meal')" class="w-full border-2 border-emerald-100 rounded p-3 bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:border-emerald-500 font-medium">
                        <option value="">-- Loading Foods... --</option>
                    </select>
                    <select id="workoutSelect" onchange="fillItem('workout')" class="hidden w-full border-2 border-orange-100 rounded p-3 bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:border-orange-500 font-medium">
                        <option value="">-- Loading Workouts... --</option>
                    </select>
                </div>

                <div id="manualSection" class="hidden">
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <input type="text" id="manualInput" placeholder="Type name (e.g. Pasta)" class="w-full border-2 border-gray-200 rounded p-3 pr-10 bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white focus:outline-none focus:border-emerald-500">
                            <button type="button" onclick="startVoiceFill()" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-xl opacity-60 hover:opacity-100 hover:scale-110 transition" title="Speak your food">
                                🎙️
                            </button>
                        </div>
                        <button type="button" onclick="askAI()" id="aiBtn" class="bg-purple-600 text-white px-4 rounded font-bold hover:bg-purple-700 transition flex items-center gap-1">✨ AI</button>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-1">Type or speak an item, then click AI to auto-estimate.</p>
                </div>
            </div>

            <div class="space-y-4 bg-gray-50 dark:bg-gray-700 p-4 rounded-lg border border-gray-100 dark:border-gray-600">
                <input type="text" name="name" id="itemName" placeholder="Item Name" readonly class="w-full bg-transparent border-b border-gray-300 dark:border-gray-500 py-1 font-bold text-gray-800 dark:text-white">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500">Calories</label>
                        <input type="number" name="calories" id="itemCalories" placeholder="0" class="w-full bg-transparent border-b border-gray-300 dark:border-gray-500 py-1 text-gray-800 dark:text-white font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500">Category</label>
                        <input type="text" name="category" id="itemCategory" placeholder="-" readonly class="w-full bg-transparent border-b border-gray-300 dark:border-gray-500 py-1 text-gray-800 dark:text-white">
                    </div>
                </div>

                <div id="macroSection" class="grid grid-cols-3 gap-2 pt-2">
                    <div><label class="text-[10px] font-bold text-blue-500">Prot (g)</label><input type="number" name="protein" id="valProtein" value="0" class="w-full bg-transparent border-b border-blue-200 py-1 text-sm dark:text-gray-200"></div>
                    <div><label class="text-[10px] font-bold text-yellow-500">Carb (g)</label><input type="number" name="carbs" id="valCarbs" value="0" class="w-full bg-transparent border-b border-yellow-200 py-1 text-sm dark:text-gray-200"></div>
                    <div><label class="text-[10px] font-bold text-red-500">Fat (g)</label><input type="number" name="fat" id="valFat" value="0" class="w-full bg-transparent border-b border-red-200 py-1 text-sm dark:text-gray-200"></div>
                </div>
            </div>

            <button class="mt-6 w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">Add to Log</button>
        </form>
    </div>
</div>

<script>
    // --- PART 1: EXISTING LOGIC (Dropdowns/Mode) ---
    let mode = 'meal';
    let inputMethod = 'dropdown';

    document.addEventListener('DOMContentLoaded', () => {
        // Fetch Foods
        fetch('/get_foods').then(res => res.json()).then(data => {
            const sel = document.getElementById('foodSelect');
            sel.innerHTML = '<option value="">-- Select Food --</option>';
            data.forEach(item => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(item).replace(/'/g, "&#39;"); 
                opt.innerText = `${item.name} (${item.calories} kcal)`;
                sel.appendChild(opt);
            });
        }).catch(e => console.error(e));

        // Fetch Workouts
        fetch('/get_workouts').then(res => res.json()).then(data => {
            const sel = document.getElementById('workoutSelect');
            sel.innerHTML = '<option value="">-- Select Workout --</option>';
            data.forEach(item => {
                let opt = document.createElement('option');
                opt.value = JSON.stringify(item).replace(/'/g, "&#39;");
                opt.innerText = item.name;
                sel.appendChild(opt);
            });
        }).catch(e => console.error(e));
    });

    function setMode(m) {
        mode = m;
        document.getElementById('macroSection').style.display = (m==='meal') ? 'grid' : 'none';
        if(inputMethod === 'dropdown') {
            document.getElementById('foodSelect').classList.toggle('hidden', m!=='meal');
            document.getElementById('workoutSelect').classList.toggle('hidden', m!=='workout');
        }
    }

    function toggleInputMode() {
        inputMethod = (inputMethod === 'dropdown') ? 'manual' : 'dropdown';
        document.getElementById('dropdownSection').classList.toggle('hidden', inputMethod==='manual');
        document.getElementById('manualSection').classList.toggle('hidden', inputMethod==='dropdown');
        document.getElementById('itemName').readOnly = (inputMethod==='dropdown');
        // 🧹 RESET ALL FIELDS (Complete Cleanup)
        document.getElementById('itemName').value = '';
        document.getElementById('itemCalories').value = '';
        document.getElementById('itemCategory').value = '-'; // Category reset
        
        if (document.getElementById('manualInput')) {
            document.getElementById('manualInput').value = ''; // AI search box reset
        }
        
        // Dropdowns ko bhi wapas "-- Select --" par set kar do
        document.getElementById('foodSelect').value = '';
        document.getElementById('workoutSelect').value = '';
        
        // Macros ko wapas 0 kar do
        document.getElementById('valProtein').value = '0';
        document.getElementById('valCarbs').value = '0';
        document.getElementById('valFat').value = '0';
        setMode(mode); 
    }

    function fillItem(type) {
        const sel = document.getElementById(type === 'meal' ? 'foodSelect' : 'workoutSelect');
        if (!sel.value) return;
        const data = JSON.parse(sel.value);
        fillFormFields(data);
    }

    // Helper to fill the inputs
    function fillFormFields(data) {
        document.getElementById('itemName').value = data.name || "Unknown";
        document.getElementById('itemCalories').value = data.calories || 0;
        document.getElementById('itemCategory').value = data.category || 'General'; 

        if(mode === 'meal') {
            document.getElementById('valProtein').value = data.protein || 0;
            document.getElementById('valCarbs').value = data.carbs || 0;
            document.getElementById('valFat').value = data.fat || 0;
        }
    }

    async function askAI() {
        const query = document.getElementById('manualInput').value;
        const btn = document.getElementById('aiBtn');
        if(!query) return alert("Type a name first!");
        
        btn.innerText = "⏳";
        try {
            const res = await fetch('/ai_estimate', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query: query, mode: mode })
            });
            const data = await res.json();
            if(data.error) alert(data.error);
            else fillFormFields(data);
        } catch(e) { console.error(e); alert("AI Failed."); }
        btn.innerText = "✨ AI";
    }

    // --- PART 2: NEW TOOL LOGIC (Voice/Camera/Barcode) ---
    
    // 1. Voice Logic (Fixed for Meal & Workout)
    function startVoiceFill() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("Browser not supported. Try Chrome.");
        
        const r = new SpeechRecognition();
        r.start(); 
        
        const statusDiv = document.getElementById('aiStatusMessage');
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = `<span class='animate-pulse'>🎙️ Listening... Say your ${mode}!</span>`;
        
        r.onresult = async (e) => {
            const text = e.results[0][0].transcript;
            statusDiv.innerHTML = `<span class='animate-pulse'>🎙️ Processing: "${text}"...</span>`;
            
            try {
                const res = await fetch('/process_voice', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    // Yahan hum 'mode' bhej rahe hain (meal ya workout)
                    body:JSON.stringify({text: text, mode: mode}) 
                });
                const data = await res.json();
                
                if(data.name) {
                    fillFormFields(data);
                    statusDiv.innerHTML = `✅ Identified: <b>${data.name}</b>`;
                } else {
                    statusDiv.innerHTML = `❌ Could not understand. Try again.`;
                }
            } catch(e) {
                statusDiv.innerHTML = `❌ Network Error.`;
            }
        };
    }

    // 2. Camera Logic
    async function snapFoodFill(input) {
    if(!input.files[0]) return;
    
    // Status box dikhayein
    const statusDiv = document.getElementById('aiStatusMessage');
    statusDiv.classList.remove('hidden');
    statusDiv.innerHTML = "<span class='animate-pulse'>📸 AI is analyzing and saving your food...</span>";
    
    const formData = new FormData();
    formData.append('image', input.files[0]);
    
    try {
        const res = await fetch('/analyze_food_image', {method:'POST', body:formData});
        const data = await res.json();
        
        if(data.success) {
            // ✅ Yahan aapki demand ke hisaab se Hyperlink wala message hai
            statusDiv.innerHTML = `✅ <b>${data.name}</b> logged in entry, <a href="/dashboard" class="text-blue-600 font-extrabold underline hover:text-blue-800">see</a>`;
        } else {
            statusDiv.innerHTML = `❌ Oops: ${data.error}`;
        }
    } catch (e) {
        statusDiv.innerHTML = `❌ Network Error. Please try again.`;
    }
    
    // Input clear kar dein taaki dobara photo daali ja sake
    input.value = '';
}

    // 3. Packet Scan Logic (Auto-Log)
    async function snapPacketFill(input) {
        if(!input.files[0]) return;
        
        const statusDiv = document.getElementById('aiStatusMessage');
        statusDiv.classList.remove('hidden');
        statusDiv.innerHTML = "<span class='animate-pulse'>📦 Reading packet nutrition label...</span>";
        
        const formData = new FormData();
        formData.append('image', input.files[0]);
        
        try {
            const res = await fetch('/analyze_packet_image', {method:'POST', body:formData});
            const data = await res.json();
            
            if(data.success) {
                statusDiv.innerHTML = `✅ <b>${data.name}</b> logged in entry, <a href="/dashboard" class="text-blue-600 font-extrabold underline hover:text-blue-800">see</a>`;
            } else {
                statusDiv.innerHTML = `❌ Oops: ${data.error}`;
            }
        } catch (e) {
            statusDiv.innerHTML = `❌ Network Error. Please try again.`;
        }
        
        input.value = ''; // Reset
    }
</script>
{% endblock %}
