{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-emerald-50">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-lg">
        <h1 class="text-3xl font-bold text-center text-emerald-800 mb-2">Welcome to HealthiPie!</h1>
        <p class="text-center text-gray-500 mb-8">Let's get to know you better.</p>

        <form method="POST">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Full Name</label>
                    <input type="text" name="name" required class="w-full border rounded p-3 mt-1">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Age</label>
                        <input type="number" name="age" required class="w-full border rounded p-3 mt-1">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Weight (kg)</label>
                        <input type="number" name="weight" required class="w-full border rounded p-3 mt-1">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Height (cm)</label>
                    <input type="number" name="height" required class="w-full border rounded p-3 mt-1">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Health Goal</label>
                    <select name="goal" class="w-full border rounded p-3 mt-1">
                        <option>Lose Weight</option>
                        <option>Maintain Weight</option>
                        <option>Gain Muscle</option>
                    </select>
                </div>
            </div>
            <button class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl mt-8 hover:bg-emerald-700">
                Start My Journey
            </button>
        </form>
    </div>
</div>
{% endblock %}
