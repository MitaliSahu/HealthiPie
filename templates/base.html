<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthiPie - Smart Health Tracker</title>
    
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#10B981">
    
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        
        // --- 🌙 THEME PERSISTENCE LOGIC ---
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <nav class="p-6 {% if request.endpoint == 'home' %}absolute w-full z-50 bg-transparent{% else %}bg-white dark:bg-gray-800 shadow-sm relative{% endif %} transition-all">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            
            <a href="/" class="flex items-center gap-2 group">
                <span class="text-2xl font-extrabold tracking-tight {% if request.endpoint == 'home' %}text-gray-900 dark:text-white{% else %}text-gray-800 dark:text-white{% endif %}">
                    HealthiPie
                </span>
            </a>

            {% if request.endpoint != 'home' %}
                <div class="flex items-center gap-6">
                    <a href="/" class="hidden md:block text-gray-500 hover:text-emerald-500 font-medium transition">Home</a>
                    <a href="/about" class="hidden md:block text-gray-500 hover:text-emerald-500 font-medium transition">About</a>
                    
                    {% if session.get('username') %}
                        <a href="/dashboard" class="text-gray-500 hover:text-emerald-500 font-medium transition">Dashboard</a>
                        <a href="/logout" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-full font-bold transition shadow-md hover:shadow-lg text-sm">Logout</a>
                        
                    {% else %}
                        <a href="/login" class="text-gray-500 hover:text-emerald-500 font-medium transition">Login</a>
                        <a href="/register" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-full font-bold transition shadow-md hover:shadow-lg text-sm">Get Started</a>
                    {% endif %}
                    
                    <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                        <span class="dark:hidden">🌙</span>
                        <span class="hidden dark:inline">☀️</span>
                    </button>
                </div>
            {% endif %}
            
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    {% if request.endpoint != 'home' %}
    <footer class="bg-white dark:bg-gray-800 py-8 mt-12 border-t border-gray-200 dark:border-gray-700">
        <div class="text-center text-gray-400 text-sm">
            &copy; 2026 HealthiPie • A Piece of Wellness for You
        </div>
    </footer>
    {% endif %}

    <script>
        // Theme Toggle
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('HealthiPie App Engine Active'))
                .catch(err => console.log('App registration failed', err));
            });
        }
    </script>
</body>
</html>
